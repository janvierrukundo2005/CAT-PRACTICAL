<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-300">
    <div class="login-container bg-blue-600 mt-10 w-[400px] rounded-[10px] ml-[400px] text-white h-[200px]">
    <h2 class=" ml-[190px] mt-2 font-bold">LogIn</h2>
    <form class="mt-10 ml-[50px]">
        <label class="hover:text-gray-500">Username</label>
        <input type="text" class="rounded-[10px] text-black pl-1" placeholder="Enter username" required><br><br>

        <label class="hover:text-gray-500">Password</label>
        <input type="password" class=" text-black ml-1  pl-1 rounded-[10px]" placeholder="Enter password" required><br><br>

      <button class="hover:text-gray-300 bg-green-600 w-[150px] h-5 ml-[80px] rounded-[10px]"><a href="Library System.html" type="submit" >LogIn</a></button>
    </form>
</div>
</body>
</html>
